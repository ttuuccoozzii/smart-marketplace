<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Marketplace</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-bg">

  <div class="login-page">
    <div class="login-card">

      <div class="login-icon">🔐</div>
      <h1 class="login-title">Admin Access</h1>
      <p class="login-subtitle">Enter your password to manage products</p>

      <form id="login-form" autocomplete="off">
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Admin password" autofocus required>
        </div>

        <div id="login-error" class="login-error" style="display:none">
          Incorrect password. Please try again.
        </div>

        <button type="submit" id="login-btn" class="btn btn-primary btn-full btn-lg">
          Sign In →
        </button>
      </form>

      <div class="login-footer">
        <a href="customer.html" class="btn btn-ghost btn-sm">← Back to store</a>
      </div>

    </div>
  </div>

  <script src="js/admin-auth.js"></script>
  <script>
    // Already authenticated → go straight to admin
    (async () => {
      if (Auth.getToken()) {
        const res = await fetch('/api/admin/check', {
          headers: { 'Authorization': `Bearer ${Auth.getToken()}` }
        }).catch(() => ({ ok: false }));
        if (res.ok) { window.location.replace('admin.html'); return; }
        Auth.clearToken();
      }
    })();

    document.getElementById('login-form').addEventListener('submit', async e => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('login-btn');
      const errEl    = document.getElementById('login-error');

      btn.disabled    = true;
      btn.textContent = 'Signing in…';
      errEl.style.display = 'none';

      const ok = await Auth.login(password);
      if (ok) {
        window.location.replace('admin.html');
      } else {
        errEl.style.display = 'block';
        btn.disabled    = false;
        btn.textContent = 'Sign In →';
        document.getElementById('password').select();
      }
    });
  </script>
</body>
</html>
